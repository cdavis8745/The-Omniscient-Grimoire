<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Spell Log</title>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
    body {
  background-color: #0c1410;
  background-image:
    radial-gradient(circle at 50% 0%, #2a4a3535 0%, transparent 55%),
    radial-gradient(circle at 15% 85%, #1a3a2828 0%, transparent 45%),
    radial-gradient(circle at 85% 70%, #2a5a4020 0%, transparent 40%),
    repeating-linear-gradient(
      45deg,
      #ffffff03 0px,
      #ffffff03 1px,
      transparent 1px,
      transparent 14px
    ),
    repeating-linear-gradient(
      -45deg,
      #ffffff02 0px,
      #ffffff02 1px,
      transparent 1px,
      transparent 14px
    );
  background-attachment: fixed;
  color: #c8dcc8;
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 17px;
  min-height: 100vh;
  padding: 24px 16px 60px;
}
  
    .page-header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 18px;
      border-bottom: 1px solid #3a5a4540;
    }
  
    .page-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 700;
      color: #a8d4b0;
      letter-spacing: 0.06em;
    }
  
    .page-header p {
      color: #6a8a76;
      font-style: italic;
      font-size: 0.95rem;
      margin-top: 4px;
    }
  
    .mic-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
  
    #mic-btn {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 16px 42px;
      background: #1c3a28;
      color: #a8d4b0;
      border: 1px solid #4a7a5a;
      border-radius: 6px;
      cursor: pointer;
    }
  
    #mic-btn:hover { background: #244a32; }
    #mic-btn:active { transform: scale(0.97); }
  
    #mic-btn.listening {
      border-color: #c0392b;
      animation: pulse 1.4s ease-in-out infinite;
    }
    /* ── DM SEARCH BOX ── */
.dm-search-area {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

.dm-search-wrapper {
  position: relative;
  width: 100%;
  max-width: 500px;
}

#dm-search-input {
  width: 100%;
  padding: 12px 18px;
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 1rem;
  background: #14211a;
  color: #c8dcc8;
  border: 1px solid #3a5a45;
  border-radius: 6px;
  outline: none;
  box-sizing: border-box;
  transition: border-color 0.2s;
}

#dm-search-input::placeholder {
  color: #4a6a56;
  font-style: italic;
}

#dm-search-input:focus {
  border-color: #6a9a7a;
}

#dm-search-suggestions {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #14211a;
  border: 1px solid #3a5a45;
  border-radius: 6px;
  max-height: 260px;
  overflow-y: auto;
  z-index: 10;
  display: none;
}

.suggestion-item {
  padding: 10px 18px;
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 0.95rem;
  color: #c8dcc8;
  cursor: pointer;
  border-bottom: 1px solid #2a4a3540;
  display: flex;
  align-items: center;
  gap: 10px;
}

.suggestion-item:last-child {
  border-bottom: none;
}

.suggestion-item:hover, .suggestion-item.active {
  background: #1c2e22;
  color: #a8d4b0;
}

.suggestion-category {
  font-size: 0.7rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.06em;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid;
  flex-shrink: 0;
}

.cat-spell    { color: #c4a352; border-color: #c4a35260; background: #c4a35215; }
.cat-rule     { color: #6a9ab8; border-color: #6a9ab860; background: #6a9ab815; }
.cat-tool     { color: #7a9a5a; border-color: #7a9a5a60; background: #7a9a5a15; }
.cat-magic    { color: #9a7ab8; border-color: #9a7ab860; background: #9a7ab815; }
.cat-weapon   { color: #8ab86a; border-color: #8ab86a60; background: #8ab86a0d; }
.cat-armor    { color: #6ab8b8; border-color: #6ab8b860; background: #6ab8b80d; }

.suggestion-name {
  flex: 1;
}

.no-results {
  padding: 12px 18px;
  color: #4a6a56;
  font-style: italic;
  font-size: 0.9rem;
}
  
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px #c0392b44; }
      50%      { box-shadow: 0 0 0 8px #c0392b22; }
    }

    @keyframes cardFadeIn {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
  
    #status           { font-style: italic; color: #6a8a76; font-size: 0.9rem; }
    #status.listening { color: #c0392b; }
    #status.found     { color: #7ab87a; }
    #status.error     { color: #c0392b; }
  
    /* ── CARD CONTAINERS ── */
    #spell-card, #rule-card, #equipment-card, #higher-levels-section {
      display: none;
      background: #14211a;
      border: 1px solid #3a5a45;
      border-radius: 10px;
      max-width: 700px;
      margin: 0 auto 32px;
      overflow: hidden;
      box-shadow: 0 8px 40px #00000080;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      z-index: 1;
      animation: cardFadeIn 0.35s ease-out;
    }

    #spell-card::before, #rule-card::before, #equipment-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #a8d4b0, transparent);
}
  
    /* ── HEADER: title + close button, X pinned top-right ── */
    .card-header {
      background: #1c2e22;
      border-bottom: 1px solid #3a5a45;
      padding: 20px 56px 16px 24px;
      position: relative;
    }
    .card-header::after {
  content: '';
  position: absolute;
  bottom: 8px;
  left: 24px;
  color: #4a7a5a60;
  font-size: 0.7rem;
}
  
    .card-header h2 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 700;
      color: #a8d4b0;
      letter-spacing: 0.03em;
      line-height: 1.25;
      margin-bottom: 12px;
    }
  
    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: #0c1410;
      border: 1px solid #3a5a45;
      border-radius: 6px;
      color: #8aa896;
      font-size: 1rem;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  
    .close-btn:hover { color: #a8d4b0; border-color: #5a8a6a; }
  
    /* badges now sit INSIDE the header, right under the title */
    .card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
  
    .badge {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 4px 11px;
      border-radius: 4px;
      border: 1px solid;
    }
  
    .badge-level     { color: #c4a352; border-color: #c4a35260; background: #c4a35215; }
    .badge-school    { color: #6a9ab8; border-color: #6a9ab860; background: #6a9ab815; }
    .badge-ritual    { color: #a87ab8; border-color: #a87ab860; background: #a87ab815; }
    .badge-rule      { color: #6a9ab8; border-color: #6a9ab860; background: #6a9ab815; }
    .badge-equipment { color: #7a9a5a; border-color: #7a9a5a60; background: #7a9a5a15; }
    .badge-cost      { color: #c4a352; border-color: #c4a35260; background: #c4a35215; }
    .badge-magic     { color: #9a7ab8; border-color: #9a7ab860; background: #9a7ab815; }
    .badge-common    { color: #8a9a8a; border-color: #8a9a8a60; background: #8a9a8a15; }
    .badge-uncommon  { color: #6a9a6a; border-color: #6a9a6a60; background: #6a9a6a15; }
    .badge-rare      { color: #6a8ab8; border-color: #6a8ab860; background: #6a8ab815; }
    .badge-veryrare  { color: #9a6ab8; border-color: #9a6ab860; background: #9a6ab815; }
    .badge-legendary { color: #c4a352; border-color: #c4a35260; background: #c4a35215; }
  
    /* ── STAT TABLE: more breathing room between label and value ── */
    .card-stats {
  width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
  border-bottom: 1px solid #3a5a4560;
  margin-bottom: 18px;
}

.card-stats tr:not(:last-child) td {
  border-bottom: 1px solid #2a4a3540;
}

.card-stats td {
  padding: 8px 0;
  line-height: 1.5;
  font-size: 1rem;
  vertical-align: top;
}

.card-stats td:first-child {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: #6a8a76;
  text-transform: uppercase;
  white-space: nowrap;
  padding-right: 10px;
  width: 140px;
}

.card-stats td:last-child {
  color: #c8dcc8;
  padding-left: 0;
}
  
    /* ── DESCRIPTION ── */
    .card-description {
      padding: 20px 24px 24px;
      font-size: 1rem;
      line-height: 1.8;
      color: #b8d0b8;
    }
  
    .card-description p { margin-bottom: 14px; }
    .card-description b { color: #d4e8d4; }
  
    .card-description table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 0.9rem;
      display: block;
      overflow-x: auto;
    }
  
    .card-description th {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6a8a76;
      padding: 8px 10px;
      border-bottom: 1px solid #3a5a4560;
      text-align: left;
    }
  
    .card-description td {
      padding: 7px 10px;
      color: #c8dcc8;
      border-bottom: 1px solid #2a4a3540;
    }
  
    .card-description .higher-levels {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #3a5a4560;
      font-style: italic;
      color: #8aa896;
    }
  
    .card-description .higher-levels strong {
      font-style: normal;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      color: #6a8a76;
      display: block;
      margin-bottom: 4px;
    }
  
    /* ── LOG + MISC (unchanged structurally) ── */
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, #3a5a4560, transparent); }
    .divider span { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.12em; color: #6a8a76; }
  
    .log-section { max-width: 700px; margin: 0 auto; }
    #spell-log-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    #spell-log-list li { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #14211a80; border: 1px solid #2a4a3540; border-radius: 4px; cursor: pointer; }
    #spell-log-list li:hover { background: #1c2e2280; }
    #spell-log-list li .log-name  { font-family: 'Cinzel', serif; font-size: 0.88rem; color: #a8d4b0; flex: 1; }
    #spell-log-list li .log-time  { font-size: 0.78rem; color: #5a7a66; font-style: italic; }
    #spell-log-list li .log-level { font-size: 0.74rem; color: #6a8a76; font-family: 'Cinzel', serif; }
    .empty-log { color: #4a6a56; font-style: italic; font-size: 0.9rem; text-align: center; padding: 16px; }
  
    #no-match { display: none; text-align: center; padding: 20px; color: #6a8a76; font-style: italic; max-width: 700px; margin: 0 auto 24px; }
  
    @media (max-width: 480px) {
      body { padding: 16px 12px 40px; }
      .card-stats td { padding: 10px 16px; }
      .card-header, .card-description { padding-left: 16px; padding-right: 50px; }
      .sigil { display:none; }
    }
    .sigil {
  position: fixed;
  top: 50%;
  width: 380px;
  height: 380px;
  transform: translateY(-50%);
  opacity: 0.12;
  color: #4a9a6a;
  filter: drop-shadow(0 0 18px #4a9a6a88) drop-shadow(0 0 40px #2a6a4a55);
  pointer-events: none;
  z-index: 0;
}

.sigil svg {
  width: 100%;
  height: 100%;
}

.sigil-left {
  left: -120px;
  animation: spinSlow 90s linear infinite;
}

.sigil-right {
  right: -120px;
  animation: spinSlowReverse 90s linear infinite;
}

@keyframes spinSlow {
  from { transform: translateY(-50%) rotate(0deg); }
  to   { transform: translateY(-50%) rotate(360deg); }
}

@keyframes spinSlowReverse {
  from { transform: translateY(-50%) rotate(360deg); }
  to   { transform: translateY(-50%) rotate(0deg); }
}
  </style> 
</head>

</div>

  <header class="page-header">
    <h1>&#9878; The Omniscient Grimoire &#9878;</h1>
    <p>Speak whatever you need — your DM will see its description</p>
  </header>

  <div class="dm-search-area">
    <div class="dm-search-wrapper">
      <input
        type="text"
        id="dm-search-input"
        placeholder="DM: type to search..."
        autocomplete="off"
        spellcheck="false"
      />
      <div id="dm-search-suggestions"></div>
    </div>
  </div>

const rules = [

  {
    name:        "Grappling",
    category:    "Rule",
    description: `<p>A creature can grapple another creature. Characters typically grapple by using an Unarmed Strike. Many monsters have special attacks that allow them to quickly grapple prey. However a grapple is initiated, it follows these rules. See also "Unarmed Strike" and "Grappled."</p> <p><b>Grappled Condition.</b> Successfully grappling a creature gives it the Grappled condition.</p> <p><b>One Grapple per Hand.</b> A creature must have a hand free to grapple another creature. Some stat blocks and game effects allow a creature to grapple using a tentacle, a maw, or another body part.</p> <p>Whatever part a grappler uses, it can grapple only one creature at a time with that part, and the grappler can't use that part to target another creature unless it ends the grapple.</p> <p><b>Escaping a Grapple.</b> A Grappled creature can use its action to make a Strength (Athletics) or Dexterity (Acrobatics) check against the grapple's escape DC, ending the condition on itself on a success. The condition also ends if the grappler has the Incapacitated condition or if the distance between the Grappled target and the grappler exceeds the grapple's range.</p>`

  {
    name:        "Concentration",
    category:    "Rule",
    description: `<p>Some spells and other effects require Concentration to remain active, as specified in their descriptions.</p> <p>If the effect's creator loses Concentration, the effect ends. If the effect has a maximum duration, the effect's description specifies how long the creator can concentrate on it: up to 1 minute, 1 hour, or some other duration. The creator can end Concentration at any time (no action required). The following factors break Concentration.</p> <p><b>Another Concentration Effect.</b> You lose Concentration on an effect the moment you start casting a spell that requires Concentration or activate another effect that requires Concentration.</p> <p><b>Damage.</b> If you take damage, you must succeed on a Constitution saving throw to maintain Concentration. The DC equals 10 or half the damage taken (round down}, whichever number is higher, up to a maximum DC of 30.</p> <p><b>Incapacitated or Dead.</b> Your Concentration ends if you have the Incapacitated condition or you die.</p>`

  {
    name:        "Cover",

    description: `<p>Cover provides a degree of protection to a target behind it. There are three degrees of cover, each of which provides a different benefit to a target: Half Cover (+2 bonus to AC and Dexterity saving throws), Three-Quarters Cover (+5 bonus to AC and Dexterity saving throws), and Total Cover (can't be targeted directly). If behind more than one degree of cover, a target benefits only from the most protective degree. See also chapter 1 ("Combat"). </p>`
  },

  {
    name:        "Falling",
    category:    "Rule",
    description: `<p>A creature that falls takes ld6 Bludgeoning damage at the end of the fall for every 10 feet it fell, to a maximum of 20d6. When the creature lands, it has the Prone condition unless it avoids taking any damage from the fall.</p> <p>A creature that falls into water or another liquid can use its Reaction to make a DC 15 Strength (Athletics) or Dexterity (Acrobatics) check to hit the surface head or feet first. On a successful check, any damage resulting from the fall is halved.</p>`

  {
    name:        "Jump Rules",
    category:    "Rule",
    description: `<p>When you make a <b><i>High Jump</b></i>, you leap into the air a number of feet equal to 3 plus your Strength modifier (minimum of O feet) if you move at least 10 feet on foot immediately before the jump. When you make a standing High Jump, you can jump only half that distance. Either way, each foot of t he jump costs a foot of movement.</p> <p>You can extend your arms half your height above yourself during the jump. Thus, you can reach a distance equal to the height of the jump plus 1½ times your height. </p> <p>When you make a <b><i>Long Jump</b></i>, you leap horizontally a number of feet up to your Strength score if you move at least 10 feet immediately before the jump. When you make a standing Long Jump, you can leap only half that distance. Either way, each foot you jump costs a foot of movement.</p> <p>If you land in Difficult Terrain, you must succeed on a DC 10 Dexterity (Acrobatics) check or have the Prone condition.</p> <p>This Long Jump rule assumes that the height of the jump doesn't matter, such as a jump across a stream or chasm. At your DM's option, you must succeed on a DC 10 Strength (Athletics) check to clear a low obstacle (no taller than a quarter of the jump's distance), such as a hedge or low wall. Otherwise, you hit the obstacle.</p>` },

  {
    name:        "Improvised Weapon",
    category:    "Rule",
    description: `<p>An improvised weapon is an object wielded as a makeshift weapon, such as broken glass, a table leg, or a frying pan. A Simple or Martial weapon also counts as an improvised weapon if it's wielded in a way contrary to its design; if you use a Ranged weapon to make a melee attack or throw a Melee weapon that lacks the Thrown property, the weapon counts as an improvised weapon. An improvised weapon follows the rules below.</p> <p><b>Proficiency.</b> Don't add your Proficiency Bonus to attack rolls with an improvised weapon.</p> <p><b>Damage.</b> On a hit, the weapon deals 1d4 damage of a type the DM thinks is appropriate for the object. Range. If you throw the weapon, it has a normal range of 20 feet and a long range of 60 feet.</p> <p><b>Weapon Equivalents.</b> If an improvised weapon resembles a Simple or Martial weapon, the DM may say it functions as that weapon and uses that weapon's rules. For example, the DM could treat a table leg as a Club.</p>`

  {
    name:        "Truesight",
    category:    "Rule",
    description: `<p>If you have Truesight, your vision is enhanced within a specified range. Within that range, your vision pierces thr ough the following:</p> <b>Darkness.</b> You can see in normal and magical Darkness.<br> <b>Invisibility.</b> You see creatures and objects that have the Invisible condition.<br> <b>Visual Illusions.</b> Visual illusions appear transparent to you, and you automatically succeed on saving throws against them.<br> <b>Transformations.</b> You discern the true form of any creature or object you see that has been transformed by magic.<br> <b>Ethereal Plane.</b> You see into the Ethereal Plane. See also appendix A ("Transitive Planes").<br></p>`

  {
    name:        "Shoving",
    category:    "Rule",
    description: `<p>The target must succeed on a Strength or Dexterity saving throw (it chooses which), or you either push it 5 feet away or cause it to have the Prone condition. The DC for the saving throw equals 8 plus your Strength modifier and Proficiency Bonus. This shove is possible only if the target is no more than one size larger than you. </p>`

  {
    name:        "Weapon Properties and Masteries",
    category:    "Rule",
    description: `<p>Here are definitions of the properties in the Properties column of the Weapons table.</p> <p><b>Ammunition.</b> You can use a weapon that has the Ammunition property to make a ranged attack only if you have ammunition to fire from it. The type of ammunition required is specified with the weapon's range. Each attack expends one piece of ammunition. Drawing the ammunition is part of the attack (you need a free hand to load a one-handed weapon). After a fight, you can spend 1 minute to recover half the ammunition (round down) you used in the fight; the rest is lost.</p> <p><b>Finesse.</b> When making an attack with a Finesse weapon, use your choice of your Strength or Dexterity modifier for the attack and damage rolls. You must use the same modifier for both rolls.</p> <p><b>Heavy.</b> You have Disadvantage on attack rolls with a Heavy weapon if it's a Melee weapon and your Strength score isn't at least 13, or if it's a Ranged weapon and your Dexterity score isn't at least 13.</p> <p><b>Light.</b> When you take the Attack action on your turn and attack with a Light weapon, you can make one extra attack as a Bonus Action later on the same turn. That extra attack must be made with a different Light weapon, and you don't add your ability modifier to the extra attack's damage unless that modifier is negative. For example, you can attack with a Shortsword in one hand and a Dagger in the other using the Attack action and a Bonus Action, but you don't add your Strength or Dexterity modifier to the damage roll of the Bonus Action unless that modifier is negative.</p> <p><b>Loading.</b> You can fire only one piece of ammunition from a Loading weapon when you use an action, a Bonus Action, or a Reaction to fire it, regardless of the number of attacks you can normally make.</p> <p><b>Range.</b> A Range weapon has a range in parentheses after the Ammunition or Thrown property. The range lists two numbers. The first is the weapon's normal range in feet, and the second is the weapon's long range. When attacking a target beyond normal range, you have Disadvantage on the attack roll. You can't attack a target beyond the long range.</p> <p><b>Reach.</b> A Reach weapon adds 5 feet to your reach when you attack with it, as well as when determining your reach for Opportunity Attacks with it.</p> <p><b>Thrown.</b> If a weapon has the Thrown property, you can throw the weapon to make a ranged attack, and you can draw that weapon as part of the attack. If the weapon is a Melee weapon, use the same ability modifier for the attack and damage rolls that you use for a melee attack with that weapon.</p> <p><b>Two-Handed.</b> A Two-Handed weapon requires two hands when you attack with it.</p> <p><b>Versatile.</b> A Versatile weapon can be used with one or two hands. A damage value in parentheses appears with the property. The weapon deals that damage when used with two hands to make a melee attack.</p> <p>Each weapon also has a mastery property, which is usable only by a character who has a feature, such as Weapon Mastery, that unlocks the property for the character. The properties are defined below.</p> <p><b>Cleave.</b> If you hit a creature with a melee attack roll using this weapon, you can make a melee attack roll with the weapon against a second creature within 5 feet of the first that is also within your reach. On a hit, the second creature takes the weapon's damage, but don't add your ability modifier to that damage unless that modifier is negative. You can make this extra attack only once per turn.</p> <p><b>Graze.</b> If your attack roll with this weapon misses a creature, you can deal damage to that creature equal to the ability modifier you used to make the attack roll. This damage is the same type dealt by the weapon, and the damage can be increased only by increasing the ability modifier.</p> <p><b>Nick.</b> When you make the extra attack of the Light property, you can make it as part of the Attack action instead of as a Bonus Action. You can make this extra attack only once per turn.</p> <p><b>Push.</b> If you hit a creature with this weapon, you can push the creature up to 10 feet straight away from yourself if it is Large or smaller.</p> <p><b>Sap.</b> If you hit a creature with this weapon, that creature has Disadvantage on its next attack roll before the start of your next turn.</p> <p><b>Slow.</b> If you hit a creature with this weapon and deal damage to it, you can reduce its Speed by 10 feet until the start of your next turn. If the creature is hit more than once by weapons that have this property, the Speed reduction doesn't exceed 10 feet.</p> <p><b>Topple.</b> If you hit a creature with this weapon, you can force the creature to make a Constitution saving throw (DC 8 plus the ability modifier used to make the attack roll and your Proficiency Bonus). On a failed save, the creature has the Prone condition.</p> <p><b>Vex.</b> If you hit a creature with this weapon and deal damage to the creature, you have Advantage on your next attack roll against that creature before the end of your next turn.</p>`, },

  {
    name:        "Vision and Light",
    category:    "Rule",
    description: `<p>The presence or absence of light determines the category of illumination in an area, as defined below.</p> <p><b>Bright Light.</b> Bright Light lets most creatures see normally. Even gloomy days provide Bright Light, as do torches, lanterns, fires, and other sources of illumination within a specific radius.</p> <p><b>Dim Light.</b> Dim Light, also called shadows, creates a Lightly Obscured area. An area of Dim Light is usually a boundary between Bright Light and surrounding Darkness. The soft light of twilight and dawn also counts as Dim Light. A full moon might bathe the land in Dim Light.</p> <p><b>Darkness.</b> Darkness creates a Heavily Obscured area. Characters face Darkness outdoors at night (even most moonlit nights), within the confines of an unlit dungeon, or in an area of magical Darkness.</p>`
  },

  {
    name:        "Special Senses",
    category:    "Rule",
    description: `<p>Types of Special Senses</p> <p><b>BLINDSIGHT -</b> If you have Blindsight, you can see within a specific range without relying on physical sight. Within that range, you can see anything that isn't behind Total Cover even if you have the Blinded condition or are in Darkness. Moreover, in that range, you can see something that has the Invisible condition.</p> <p><b>DARKVISION -</b> If you have Darkvision, you can see in Dim Light within a specified range as if it were Bright Light and in Darkness within that range as if it were Dim Light. You discern colors in that Darkness only as shades of gray.</p> <p><b>TREMORSENSE -</b> A creature with Tremorsense can pinpoint the location of creatures and moving objects within a specific range, provided that the creature with Tremorsense and anything it is detecting are both in contact with the same surface (such as the ground, a wall, or a ceiling) or the same liquid.</p> <p>Tremorsense can't detect creatures or objects in the a ir, and it doesn't count as a form of sight.</p> <p><b>TRUESIGHT -</b> press "Speak" and say "Truesight"</p>`
  },

  {
    name:        "Conditions",
    category:    "Rule",
    description: `<p>List of Conditions</p> <p><b><i>BLINDED</i></b> - While you have the Blinded condition, you experience the following effects.<br> <b>Can't See.</b> You can't see and automatically fail any ability check that requires sight.<br> <b>Attacks Affected.</b> Attack rolls against you have Advantage, and your attack rolls have Disadvantage.</p> <p><b><i>CHARMED</i></b> - While you have the Charmed condition, you experience the following effects.<br> <b>Can't Harm the Charmer.</b> You can't attack the charmer or target the charmer with damaging abilities or magical effects.<br> <b>Social Advantage.</b> The charmer has Advantage on any ability check to interact with you socially. </p> <p><b><i>DEAFENED</i></b> - While you have the Deafened condition, you experience the following effect.<br> <b>Can't Hear.</b> You can't hear and automatically fail any ability check that requires hearing. </p> <p><b><i>EXAUSTION</i></b> - While you have the Exhaustion condition, you experience the following effects.<br> <b>Exhaustion Levels.</b> This condition is cumulative. Each time you receive it, you gain 1 Exhaustion level. You die if your Exhaustion level is 6.<br> <b>D20 Tests Affected.</b> When you make a D2O Test, the roll is reduced by 2 times your Exhaustion level.<br> <b>Speed Reduced.</b> Your Speed is reduced by a number of feet equal to 5 times your Exhaustion level.<br> <b>Removing Exhaustion Levels.</b> Finishing a Long Rest removes 1 of your Exhaustion levels. When your Exhaustion level reaches 0, the condition ends.</p> <p><b><i>FRIGHTENED</i></b> - While you have the Frightened condition, you experience the following effects.<br> <b>Ability Checks and Attacks Affected.</b> You have Disadvantage on ability checks and attack rolls while the source of fear is within line of sight.<br> <b>Can't Approach.</b> You can't willingly move closer to the source of fear. </p> <p><b><i>GRAPPLED</i></b> - While you have the Grappled condition, you experience the following effects.<br> <b>Speed 0.</b> Your Speed is O and can't increase.<br> <b>Attacks Affected.</b> You have Disadvantage on attack rolls against any target other than the grappler.<br> <b>Movable.</b> The grappler can drag or carry you when it moves, but every foot of movement costs it 1 extra foot unless you are Tiny or two or more sizes smaller than it.</p> <p><b><i>INCAPACITATED</i></b> - While you have the Incapacitated condition, you experience the following effects.<br> <b>Inactive.</b> You can't take any action, Bonus Action, or Reaction.<br> <b>No Concentration.</b> Your Concentration is broken. Speechless. You can't speak.<br> <b>Surprised.</b> If you're Incapacitated when you roll Initiative, you have Disadvantage on the roll. </p> <p><b><i>INVISIBLE</i></b> - While you have the Invisible condition, you experience the following effects.<br> <b>Surprise.</b> If you're Invisible when you roll Initiative, you have Advantage on the roll.<br> <b>Concealed.</b> You aren't affected by any effect that requires its target to be seen unless the effect's creator can somehow see you. Any equipment you are wearing or carrying is also concealed.<br> <b>Attacks Affected.</b> Attack rolls against you have Disadvantage, and your attack rolls have Advantage. If a creature can somehow see you, you don't gain this benefit against that creature. </p> <p><b><i>PARALYZED</i></b> - While you have the Paralyzed condition, you experience the following effects.<br> <b>Incapacitated.</b> You have the Incapacitated condition.<br> <B>Speed 0.</b> Your Speed is O and can't increase.<br> <b>Saving Throws Affected.</b> You automatically fail Strength and Dexterity saving throws.<br> <b>Attacks Affected.</b> Attack rolls against you have Advantage.<br> <b>Automatic Critical Hits.</b> Any attack roll that hits you is a Critical Hit if the attacker is within 5 feet of you. </p> <p><b><i>PETRIFIED</i></b> - While you have the Petrified condition, you experience the following effects.<br> <b>Turned to Inanimate Substance.</b> You are transformed, along with any nonmagical objects you are wearing and carrying, into a solid inanimate substance (usually stone). Your weight increases by a factor of ten, and you cease aging.<br> <b>Incapacitated.</b> You have the Incapacitated condition.<br> <b>Speed 0.</b> Your Speed is O and can't increase.<br> <b>Attacks Affected.</b> Attack rolls against you have Advantage.<br> <b>Saving Throws Affected.</b> You automatically fail Strength and Dexterity saving throws.<br> <b>Resist Damage.</b> You have Resistance to all damage.<br> <b>Poison Immunity.</b> You have Immunity to the Poisoned condition. </p> <p><b><i>POISONED</i></b> - While you have the Poisoned condition, you experience the following effect.<br> <b>Ability Checks and Attacks Affected.</b> You have Disadvantage on attack rolls and ability checks.  </p> <p><b><i>PRONE</i></b> - While you have the Prone condition, you experience the following effects.<br> <b>Restricted Movement.</b> Your only movement options are to crawl or to spend an amount of movement equal to half your Speed (round down) to right yourself and thereby end the condition. If your Speed is 0, you can't right yourself.<br> <b>Attacks Affected.</b> You have Disadvantage on attack rolls. An attack roll against you has Advantage if the attacker is within 5 feet of you. Otherwise, that attack roll has Disadvantage. </p> <p><b><i>RESTRAINED</i></b> - While you have the Restrained condition, you experience the following effects.<br> <b>Speed 0.</b> Your Speed is O and can't increase. Attacks Affected. Attack rolls against you have Advantage, and your attack rolls have Disadvantage.<br> <b>Saving Throws Affected.</b> You have Disadvantage on Dexterity saving throws</p> <p><b><i>STUNNED</i></b> - While you have the Stunned condition, you experience the following effects.<br> <b>Incapacitated.</b> You have the Incapacitated condition.<br> <b>Saving Throws Affected.</b> You automatically fail Strength and Dexterity saving throws.<br> <b>Attacks Affected.</b> Attack rolls against you have Advantage. </p> <p><b><i>UNCONSCIOUS</i></b> - While you have the Unconscious condition, you experience the following effects.<br> <b>Inert.</b> You have the Incapacitated and Prone conditions, and you drop whatever you're holding. When this condition ends, you remain Prone.<br> <b>Speed 0.</b> Your Speed is O and can't increase. Attacks Affected. Attack rolls against you have Advantage.<br> <b>Saving Throws Affected.</b> You automatically fail Strength and Dexterity saving throws.<br> <b>Automatic Critical Hits.</b> Any attack roll that hits you is a Critical Hit if the attacker is within 5 feet of you.<br> <b>Unaware.</b> You're unaware of your surroundings. </p>` },

  {
    name:        "Wild Magic Table",
    category:    "Rule",
    description: `<p>Roll 1d100 to determine the effect:</p> <table> <tr><th>1d100</th><th>Effect</th></tr> <tr><td>01&ndash;04</td><td>Roll on this table at the start of each of your turns for the next minute, ignoring this result on subsequent rolls.</td></tr> <tr><td>05&ndash;08</td><td>A creature that is Friendly toward you appears in a random unoccupied space within 60 feet of you. The creature is under the DM's control and disappears 1 minute later. Roll 1d4 to determine the creature: on a 1, a Modron Duodrone appears; on a 2, a Flumph appears; on a 3, a Modron Monodrone appears; on a 4, a Unicorn appears. See the Monster Manual for the creature's stat block.</td></tr> <tr><td>09&ndash;12</td><td>For the next minute, you regain 5 Hit Points at the start of each of your turns.</td></tr> <tr><td>13&ndash;16</td><td>Creatures have Disadvantage on saving throws against the next spell you cast in the next minute that involves a saving throw.</td></tr> <tr><td>17&ndash;20</td><td>You are subjected to an effect that lasts for 1 minute unless its description says otherwise. Roll 1d8 to determine the effect: on a 1, you're surrounded by faint, ethereal music only you and creatures within 5 feet of you can hear; on a 2, your size increases by one size category; on a 3, you grow a long beard made of feathers that remains until you sneeze, at which point the feathers explode from your face and vanish; on a 4, you must shout when you speak; on a 5, illusory butterflies flutter in the air within 10 feet of you; on a 6, an eye appears on your forehead, granting you Advantage on Wisdom (Perception) checks; on a 7, pink bubbles float out of your mouth whenever you speak; on an 8, your skin turns a vibrant shade of blue for 24 hours or until the effect is ended by a Remove Curse spell.</td></tr> <tr><td>21&ndash;24</td><td>For the next minute, all your spells with a casting time of an action have a casting time of a Bonus Action.</td></tr> <tr><td>25&ndash;28</td><td>You are transported to the Astral Plane until the end of your next turn. You then return to the space you previously occupied or the nearest unoccupied space if that space is occupied.</td></tr> <tr><td>29&ndash;32</td><td>The next time you cast a spell that deals damage within the next minute, don't roll the spell's damage dice for the damage. Instead use the highest number possible for each damage die.</td></tr> <tr><td>33&ndash;36</td><td>You have Resistance to all damage for the next minute.</td></tr> <tr><td>37&ndash;40</td><td>You turn into a potted plant until the start of your next turn. While you're a plant, you have the Incapacitated condition and have Vulnerability to all damage. If you drop to 0 Hit Points, your pot breaks, and your form reverts.</td></tr> <tr><td>41&ndash;44</td><td>For the next minute, you can teleport up to 20 feet as a Bonus Action on each of your turns.</td></tr> <tr><td>45&ndash;48</td><td>You and up to three creatures you choose within 30 feet of you have the Invisible condition for 1 minute. This invisibility ends on a creature immediately after it makes an attack roll, deals damage, or casts a spell.</td></tr> <tr><td>49&ndash;52</td><td>A spectral shield hovers near you for the next minute, granting you a +2 bonus to AC and immunity to Magic Missile.</td></tr> <tr><td>53&ndash;56</td><td>You can take one extra action on this turn.</td></tr> <tr><td>57&ndash;60</td><td>You cast a random spell. If the spell normally requires Concentration, it doesn't require Concentration in this case; the spell lasts for its full duration. Roll 1d10 to determine the spell: on a 1, Confusion; on a 2, Fireball; on a 3, Fog Cloud; on a 4, Fly (cast on a random creature within 60 feet of you); on a 5, Grease; on a 6, Levitate (cast on yourself); on a 7, Magic Missile (cast as a level 5 spell); on an 8, Mirror Image; on a 9, Polymorph (cast on yourself, and if you fail the saving throw, you turn into a Goat); on a 10, See Invisibility.</td></tr> <tr><td>61&ndash;64</td><td>For the next minute, any flammable, nonmagical object you touch that isn't being worn or carried by another creature bursts into flame, takes 1d4 Fire damage, and is burning.</td></tr> <tr><td>65&ndash;68</td><td>If you die within the next hour, you immediately revive as if by the Reincarnate spell.</td></tr> <tr><td>69&ndash;72</td><td>You have the Frightened condition until the end of your next turn. The DM determines the source of your fear.</td></tr> <tr><td>73&ndash;76</td><td>You teleport up to 60 feet to an unoccupied space you can see.</td></tr> <tr><td>77&ndash;80</td><td>A random creature within 60 feet of you has the Poisoned condition for 1d4 hours.</td></tr> <tr><td>81&ndash;84</td><td>You radiate Bright Light in a 30-foot radius for the next minute. Any creature that ends its turn within 5 feet of you has the Blinded condition until the end of its next turn.</td></tr> <tr><td>85&ndash;88</td><td>Up to three creatures of your choice that you can see within 30 feet of you take 1d10 Necrotic damage. You regain Hit Points equal to the sum of the Necrotic damage dealt.</td></tr> <tr><td>89&ndash;92</td><td>Up to three creatures of your choice that you can see within 30 feet of you take 4d10 Lightning damage.</td></tr> <tr><td>93&ndash;96</td><td>You and all creatures within 30 feet of you have Vulnerability to Piercing damage for the next minute.</td></tr> <tr><td>97&ndash;00</td><td>Roll 1d6: on a 1, you regain 2d10 Hit Points; on a 2, one ally of your choice within 300 feet of you regains 2d10 Hit Points; on a 3, you regain your lowest-level expended spell slot; on a 4, one ally of your choice within 300 feet of you regains their lowest-level expended spell slot; on a 5, you regain all your expended Sorcery Points; on a 6, all the effects of row 17&ndash;20 affect you simultaneously.</td></tr> </table></p>` },

  {
    name:        "Magic Item Rarities",
    category:    "Rule",
    description: `<p>Magic items are divided into six rarity categories, which give a rough sense of an item's power and value. The table below lists the approximate value of each rarity. These values can be used for buying, selling, or rewarding magic items at the DM's discretion.</p>

<table>
  <tr>
    <th>Rarity</th>
    <th>Approximate Value</th>
  </tr>
  <tr><td>Common</td><td>100 GP</td></tr>
  <tr><td>Uncommon</td><td>400 GP</td></tr>
  <tr><td>Rare</td><td>4,000 GP</td></tr>

</table>

<p><b>Consumable items</b> (potions, ammunition, and similar single-use items) are worth <b>half</b> the value listed above, with one exception: a <b>Spell Scroll's</b> value is double the cost to scribe that scroll, as specified in the Player's Handbook.</p>`

  {
  name:        "Artifact Properties",

  <tr><td>21&ndash;30</td><td>While attuned to the Artifact, you have Immunity to the Poisoned condition.</td></tr>

<p><b>Balance.</b> You can increase one of your ability scores by 2, to a maximum of 22, provided you also decrease another one of your ability scores by 2. You can’t decrease an ability that has a score of 5 or lower. Alternatively, you can choose not to adjust your ability scores, in which case this card has no effect.</p>

<p><b>Comet.</b> The next time you enter combat against one or more <b>Hostile</b> creatures, you can select one of them as your foe when you roll Initiative. If you reduce your foe to 0 Hit Points during that combat, you have Advantage on <b>Death Saving Throws</b> for 1 year. If someone else reduces your chosen foe to 0 Hit Points or you don’t choose a foe, this card has no effect.</p>

<p><b>Donjon.</b> You disappear and become entombed in a state of suspended animation in an extradimensional sphere. Everything you’re wearing and carrying disappears with you except for Artifacts, which stay behind in the space you occupied when you disappeared. You remain imprisoned until you are found and removed from the sphere. You can’t be located by any Divination magic, but a Wish spell can reveal the location of your prison. You draw no more cards. </p>

<p><b>Euryale.</b> You take a &minus;2 penalty to saving throws while cursed in this way. Only a god or the Fates card can end this curse.</p>

<p><b>Fates.</b> Reality’s fabric unravels and spins anew, allowing you to avoid or erase one event as if it never happened. You can use the card’s magic as soon as you
draw the card or at any other time before you die.</p>

<p><b>Flames.</b> A powerful devil becomes your enemy, seeking your ruin until either you or the devil dies.</p>

<p><b>Fool.</b> You have Disadvantage on D20 Tests for the next 72 hours. Draw another card; this draw doesn't count as one of your declared draws.</p>

<p><b>Gem.</b> Twenty-five pieces of jewelry worth 2,000 GP each or fifty gems worth 1,000 GP each appear at your feet.</p>

<p><b>Jester.</b> You have Advantage on D20 Tests for the next 72 hours, or you can draw two additional cards beyond your declared draws.</p>

<p><b>Key.</b> A Rare or rarer magic weapon with which you are proficient appears on your person.</p>

<p><b>Knight.</b> You gain the service of a Knight, who magically appears in an unoccupied space you choose within 30 feet of yourself. The knight has the same alignment
as you and serves you loyally until death, believing the two of you have been drawn together by fate. Work with your DM to create a name and backstory
for this NPC. The DM can use a different stat block to represent the knight, as desired.</p>

<p><b>Moon.</b> You gain the ability to cast <i>Wish</i> 1d3 times.</p>

<p><b>Puzzle.</b> Permanently reduce your Intelligence or Wisdom by 1d4 + 1 (minimum 1). You can draw one additional card.</p>

<p><b>Rogue.</b> An NPC of the DM’s choice becomes Hostile toward you. You don’t know the identity of this NPC until they or someone else reveals it. Nothing less than a
Wish spell or divine intervention can end the NPC’s hostility toward you.
</p>

<p><b>Ruin.</b> All forms of wealth that you carry or own, other than magic items, are lost to you. Portable property vanishes. Businesses, buildings, and land you own are
lost in a way that alters reality the least. If you have a Bastion (see chapter 8), it is destroyed by some calamity beyond your control. Any documentation
that proves you should own something lost to this card also disappears.</p>

<p><b>Sage.</b> At any time within one year, you can ask a question in meditation and receive a truthful answer.</p>

<p><b>Skull.</b> An <b>Avatar of Death</b> (see accompanying stat block) appears in an unoccupied space as close to you as possible. The avatar targets only you with its
attacks, appearing as a ghostly skeleton clad in a tattered black robe and carrying a spectral scythe. The avatar disappears when it drops to 0 Hit Points or
you die. If an ally of yours deals damage to the avatar, that ally summons another <b>Avatar of Death</b>. The new avatar appears in an unoccupied space as
close to that ally as possible and targets only that ally with its attacks. You and your allies can each summon only one avatar as a consequence of this
draw. A creature slain by an avatar can’t be restored to life.
</p>

<p><b>Star.</b> Increase one of your ability scores by 2, to a maximum of 24.</p>

<p><b>Sun.</b> A magic item chosen by the DM appears on your person. You gain 10 Temporary Hit Points daily at dawn until you die.</p>

<p><b>Talons.</b> Every magic item you wear or carry disintegrates. Artifacts vanish instead.</p>

<p><b>Throne.</b> You gain proficiency and Expertise in your choice of History, Insight, Intimidation, or Persuasion. In addition, you gain rightful ownership of a small keep
somewhere in the world. However, the keep is currently home to one or more monsters, which must be cleared out before you can claim the keep as yours.</p>

<p><b>Void.</b> Your soul is drawn from your body and contained in an object in a place of the DM’s choice. One or more powerful beings guard the place. While your soul
is trapped in this way, your body is inert, ceases aging, and requires no food, air, or water. A Wish spell can’t return your soul to your body, but the spell
reveals the location of the object that holds your soul. You draw no more cards.</p>`
},

    // ── 2. FUSE.JS FUZZY SEARCH ───────────────────────────────
    const allEntries = [...spells, ...rules, ...equipment];

    const fuse = new Fuse(allEntries, {
      keys:      ["name"],
      threshold: 0.35,
    });

    function findSpell(spokenText) {
      const results = fuse.search(spokenText);

      if (results.length > 0) {
        const entry = results[0].item;

       if (entry.category === "Spell") {
         showSpellCard(entry);
      } else if (entry.category === "Rule") {
      showRuleCard(entry);
      } else {
      showEquipmentCard(entry);   // Weapon, Armor, or Tool
      }

    addToLog(entry);
    setStatus("Found: " + entry.name, "found");
  } else {
    const noMatch = document.getElementById("no-match");
    noMatch.textContent = 'No match found for "' + spokenText + '" — try again.';
    noMatch.style.display = "block";
    setStatus("No match found", "error");
  }
}


    // ── 3. VOICE RECOGNITION ──────────────────────────────────
    let recognition = null;

    function initRecognition() {
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        setStatus("Voice not supported — use Chrome or Edge", "error");
        document.getElementById("mic-btn").disabled = true;
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous     = false;
      recognition.lang           = "en-US";
      recognition.interimResults = false;

      recognition.onstart = () => {
        setStatus("Listening...", "listening");
        document.getElementById("mic-btn").classList.add("listening");
      };

      recognition.onresult = (event) => {
        const spoken = event.results[0][0].transcript.toLowerCase();
        findSpell(spoken);
      };

      recognition.onend = () => {
        document.getElementById("mic-btn").classList.remove("listening");
        if (document.getElementById("status").textContent === "Listening...") {
          setStatus("Ready — tap to listen", "");
        }
      };

      recognition.onerror = (e) => {
        document.getElementById("mic-btn").classList.remove("listening");
        setStatus("Mic error: " + e.error, "error");
      };
    }

    function startListening() {
      if (!recognition) initRecognition();
      if (!recognition)  return;
      document.getElementById("no-match").style.display = "none";
      try {
        recognition.start();
      } catch(e) {
        recognition.stop();
        setTimeout(() => recognition.start(), 200);
      }
    }

    function setStatus(text, cls) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.className   = cls || "";
    }

      document.getElementById("spell-card-ritual").style.display =
        spell.ritual ? "inline" : "none";

const higherText     = document.getElementById("higher-levels-standalone-text");
if (spell.higherLevels) {

    function addToLog(spell) {

      if (empty) empty.remove();

      const time = now.getHours().toString().padStart(2,"0") + ":" +

    // ── DM SILENT SEARCH ──────────────────────────────────────
const dmInput       = document.getElementById("dm-search-input");
const suggestionBox = document.getElementById("dm-search-suggestions");
let activeSuggestion = -1;

function getCategoryClass(category) {
  const map = {
    "Spell":     "cat-spell",
    "Rule":      "cat-rule",
    "Tool":      "cat-tool",
    "Magic Item":"cat-magic",
    "Weapon":    "cat-weapon",
    "Armor":     "cat-armor",
  };
  return map[category] || "cat-tool";
}

function getCategoryLabel(category) {
  const map = {
    "Spell":     "Spell",
    "Rule":      "Rule",
    "Tool":      "Item",
    "Magic Item":"Magic",
    "Weapon":    "Weapon",
    "Armor":     "Armor",
  };
  return map[category] || category;
}

function showSuggestions(query) {
  suggestionBox.innerHTML = "";
  activeSuggestion = -1;

  if (!query || query.length < 1) {
    suggestionBox.style.display = "none";
    return;
  }

  const lower   = query.toLowerCase();
  const matches = allEntries.filter(entry =>
    entry.name.toLowerCase().includes(lower)
  ).slice(0, 12);

  if (matches.length === 0) {
    suggestionBox.innerHTML = `<div class="no-results">No results found</div>`;
    suggestionBox.style.display = "block";
    return;
  }

  matches.forEach((entry, index) => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.dataset.index = index;
    item.innerHTML = `
      <span class="suggestion-category ${getCategoryClass(entry.category)}">
        ${getCategoryLabel(entry.category)}
      </span>
      <span class="suggestion-name">${entry.name}</span>
    `;

    item.addEventListener("mousedown", (e) => {
      e.preventDefault();
      selectEntry(entry);
    });

    suggestionBox.appendChild(item);
  });

  suggestionBox.style.display = "block";
}

function selectEntry(entry) {
  dmInput.value = "";
  suggestionBox.style.display = "none";
  suggestionBox.innerHTML = "";
  activeSuggestion = -1;

  if (entry.category === "Spell") {
    showSpellCard(entry);
  } else if (entry.category === "Rule") {
    showRuleCard(entry);
  } else {
    showEquipmentCard(entry);
  }

  addToLog(entry);
  setStatus("Found: " + entry.name, "found");
}

// keyboard navigation through suggestions
dmInput.addEventListener("keydown", (e) => {
  const items = suggestionBox.querySelectorAll(".suggestion-item");

  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeSuggestion = Math.min(activeSuggestion + 1, items.length - 1);
    items.forEach((el, i) =>
      el.classList.toggle("active", i === activeSuggestion)
    );
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeSuggestion = Math.max(activeSuggestion - 1, -1);
    items.forEach((el, i) =>
      el.classList.toggle("active", i === activeSuggestion)
    );
  } else if (e.key === "Enter") {
    e.preventDefault();
    if (activeSuggestion >= 0 && items[activeSuggestion]) {
      items[activeSuggestion].dispatchEvent(new Event("mousedown"));
    } else if (items.length > 0) {
      items[0].dispatchEvent(new Event("mousedown"));
    }
  } else if (e.key === "Escape") {
    suggestionBox.style.display = "none";
    dmInput.blur();
  } else if (e.code === "Space") {
    // allow spacebar to type normally inside the input
    e.stopPropagation();
  }
});

dmInput.addEventListener("input", () => {
  showSuggestions(dmInput.value.trim());
});

// close suggestions when clicking elsewhere
document.addEventListener("click", (e) => {
  if (!dmInput.contains(e.target) && !suggestionBox.contains(e.target)) {
    suggestionBox.style.display = "none";
  }
});
  </script>

</body>
</html>
