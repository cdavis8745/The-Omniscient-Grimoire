<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Spell Log</title>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
    body {
  background-color: #0c1410;
  background-image:
    radial-gradient(circle at 50% 0%, #2a4a3535 0%, transparent 55%),
    radial-gradient(circle at 15% 85%, #1a3a2828 0%, transparent 45%),
    radial-gradient(circle at 85% 70%, #2a5a4020 0%, transparent 40%),
    repeating-linear-gradient(
      45deg,
      #ffffff03 0px,
      #ffffff03 1px,
      transparent 1px,
      transparent 14px
    ),
    repeating-linear-gradient(
      -45deg,
      #ffffff02 0px,
      #ffffff02 1px,
      transparent 1px,
      transparent 14px
    );
  background-attachment: fixed;
  color: #c8dcc8;
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 17px;
  min-height: 100vh;
  padding: 24px 16px 60px;
}
  
    .page-header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 18px;
      border-bottom: 1px solid #3a5a4540;
    }
  
    .page-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 700;
      color: #a8d4b0;
      letter-spacing: 0.06em;
    }
  
    .page-header p {
      color: #6a8a76;
      font-style: italic;
      font-size: 0.95rem;
      margin-top: 4px;
    }
  
    .mic-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
  
    #mic-btn {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 16px 42px;
      background: #1c3a28;
      color: #a8d4b0;
      border: 1px solid #4a7a5a;
      border-radius: 6px;
      cursor: pointer;
    }
  
    #mic-btn:hover { background: #244a32; }
    #mic-btn:active { transform: scale(0.97); }
  
    #mic-btn.listening {
      border-color: #c0392b;
      animation: pulse 1.4s ease-in-out infinite;
    }
  
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px #c0392b44; }
      50%      { box-shadow: 0 0 0 8px #c0392b22; }
    }

    @keyframes cardFadeIn {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
  
    #status           { font-style: italic; color: #6a8a76; font-size: 0.9rem; }
    #status.listening { color: #c0392b; }
    #status.found     { color: #7ab87a; }
    #status.error     { color: #c0392b; }
  
    /* ── CARD CONTAINERS ── */
    #spell-card, #rule-card, #equipment-card, #higher-levels-section {
      display: none;
      background: #14211a;
      border: 1px solid #3a5a45;
      border-radius: 10px;
      max-width: 700px;
      margin: 0 auto 32px;
      overflow: hidden;
      box-shadow: 0 8px 40px #00000080;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: cardFadeIn 0.35s ease-out;
    }

    #spell-card::before, #rule-card::before, #equipment-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #a8d4b0, transparent);
}
  
    /* ── HEADER: title + close button, X pinned top-right ── */
    .card-header {
      background: #1c2e22;
      border-bottom: 1px solid #3a5a45;
      padding: 20px 56px 16px 24px;
      position: relative;
    }
    .card-header::after {
  content: '';
  position: absolute;
  bottom: 8px;
  left: 24px;
  color: #4a7a5a60;
  font-size: 0.7rem;
}
  
    .card-header h2 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 700;
      color: #a8d4b0;
      letter-spacing: 0.03em;
      line-height: 1.25;
      margin-bottom: 12px;
    }
  
    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: #0c1410;
      border: 1px solid #3a5a45;
      border-radius: 6px;
      color: #8aa896;
      font-size: 1rem;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  
    .close-btn:hover { color: #a8d4b0; border-color: #5a8a6a; }
  
    /* badges now sit INSIDE the header, right under the title */
    .card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
  
    .badge {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 4px 11px;
      border-radius: 4px;
      border: 1px solid;
    }
  
    .badge-level     { color: #c4a352; border-color: #c4a35260; background: #c4a35215; }
    .badge-school    { color: #6a9ab8; border-color: #6a9ab860; background: #6a9ab815; }
    .badge-ritual    { color: #a87ab8; border-color: #a87ab860; background: #a87ab815; }
    .badge-rule      { color: #6a9ab8; border-color: #6a9ab860; background: #6a9ab815; }
    .badge-equipment { color: #7a9a5a; border-color: #7a9a5a60; background: #7a9a5a15; }
    .badge-cost      { color: #c4a352; border-color: #c4a35260; background: #c4a35215; }
  
    /* ── STAT TABLE: more breathing room between label and value ── */
    .card-stats {
  width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
  border-bottom: 1px solid #3a5a4560;
  margin-bottom: 18px;
}

.card-stats tr:not(:last-child) td {
  border-bottom: 1px solid #2a4a3540;
}

.card-stats td {
  padding: 8px 0;
  line-height: 1.5;
  font-size: 1rem;
  vertical-align: top;
}

.card-stats td:first-child {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: #6a8a76;
  text-transform: uppercase;
  white-space: nowrap;
  padding-right: 10px;
  width: 140px;
}

.card-stats td:last-child {
  color: #c8dcc8;
  padding-left: 0;
}
  
    /* ── DESCRIPTION ── */
    .card-description {
      padding: 20px 24px 24px;
      font-size: 1rem;
      line-height: 1.8;
      color: #b8d0b8;
    }
  
    .card-description p { margin-bottom: 14px; }
    .card-description b { color: #d4e8d4; }
  
    .card-description table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 0.9rem;
      display: block;
      overflow-x: auto;
    }
  
    .card-description th {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6a8a76;
      padding: 8px 10px;
      border-bottom: 1px solid #3a5a4560;
      text-align: left;
    }
  
    .card-description td {
      padding: 7px 10px;
      color: #c8dcc8;
      border-bottom: 1px solid #2a4a3540;
    }
  
    .card-description .higher-levels {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #3a5a4560;
      font-style: italic;
      color: #8aa896;
    }
  
    .card-description .higher-levels strong {
      font-style: normal;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      color: #6a8a76;
      display: block;
      margin-bottom: 4px;
    }
  
    /* ── LOG + MISC (unchanged structurally) ── */
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, #3a5a4560, transparent); }
    .divider span { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.12em; color: #6a8a76; }
  
    .log-section { max-width: 700px; margin: 0 auto; }
    #spell-log-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    #spell-log-list li { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #14211a80; border: 1px solid #2a4a3540; border-radius: 4px; cursor: pointer; }
    #spell-log-list li:hover { background: #1c2e2280; }
    #spell-log-list li .log-name  { font-family: 'Cinzel', serif; font-size: 0.88rem; color: #a8d4b0; flex: 1; }
    #spell-log-list li .log-time  { font-size: 0.78rem; color: #5a7a66; font-style: italic; }
    #spell-log-list li .log-level { font-size: 0.74rem; color: #6a8a76; font-family: 'Cinzel', serif; }
    .empty-log { color: #4a6a56; font-style: italic; font-size: 0.9rem; text-align: center; padding: 16px; }
  
    #no-match { display: none; text-align: center; padding: 20px; color: #6a8a76; font-style: italic; max-width: 700px; margin: 0 auto 24px; }
  
    @media (max-width: 480px) {
      body { padding: 16px 12px 40px; }
      .card-stats td { padding: 10px 16px; }
      .card-header, .card-description { padding-left: 16px; padding-right: 50px; }
    }
  </style> 
</head>

<body>

  <header class="page-header">
    <h1>&#9878; The Omniscient Grimoire &#9878;</h1>
    <p>Speak whatever you need — your DM will see its description</p>
  </header>

  <div class="mic-area">
    <button id="mic-btn" onclick="startListening()">
       Speak
    </button>
    <p id="status">Ready — tap to listen</p>
  </div>

  <!-- SPELL CARD -->
<div id="spell-card" role="dialog" aria-labelledby="spell-card-name">

  <div class="card-header">
    <h2 id="spell-card-name"></h2>
    <div class="card-meta">
      <span class="badge badge-level"  id="spell-card-level"></span>
      <span class="badge badge-school" id="spell-card-school"></span>
      <span class="badge badge-ritual" id="spell-card-ritual" style="display:none">Ritual</span>
    </div>
    <button class="close-btn" onclick="closeAllCards()" aria-label="Close">&#10005;</button>
  </div>

  <table class="card-stats">
    <tr><td>Casting Time:</td><td id="spell-card-time"></td></tr>
    <tr><td>Range:</td><td id="spell-card-range"></td></tr>
    <tr><td>Components:</td><td id="spell-card-components"></td></tr>
    <tr><td>Duration:</td><td id="spell-card-duration"></td></tr>
  </table>

  <div class="card-description">
    <p id="spell-card-description"></p>
  </div>

</div>

<div id="higher-levels-section" style="display:none">
  <div class="card-header">
    <h2>At Higher Levels</h2>
  </div>
  <div class="card-description">
    <p id="higher-levels-standalone-text"></p>
  </div>
</div>


<!-- RULE CARD -->
<div id="rule-card" role="dialog" aria-labelledby="rule-card-name">

  <div class="card-header">
    <h2 id="rule-card-name"></h2>
    <div class="card-meta">
      <span class="badge badge-rule" id="rule-card-badge">Rule</span>
    </div>
    <button class="close-btn" onclick="closeAllCards()" aria-label="Close">&#10005;</button>
  </div>

  <div class="card-description">
    <p id="rule-card-description"></p>
  </div>

</div>


<!-- EQUIPMENT CARD -->
<div id="equipment-card" role="dialog" aria-labelledby="equipment-card-name">

  <div class="card-header">
    <h2 id="equipment-card-name"></h2>
    <div class="card-meta">
      <span class="badge badge-equipment" id="equipment-card-type"></span>
      <span class="badge badge-cost" id="equipment-card-cost"></span>
    </div>
    <button class="close-btn" onclick="closeAllCards()" aria-label="Close">&#10005;</button>
  </div>

  <table class="card-stats" id="equipment-stats-table">
  </table>

  <div class="card-description">
    <p id="equipment-card-description"></p>
  </div>

</div>

<p id="no-match"></p>

<div class="log-section">
  <div class="divider"><span>Cast History</span></div>
  <ul id="spell-log-list">
    <li class="empty-log" id="empty-log-msg">No spells cast yet this session</li>
  </ul>
</div>

  <script>

    // ── 1. SPELL DATABASE ──────────────────────────────────────
    const spells = [
  {  
    name:        "Acid Splash",
    category:    "Spell",
    level:       "Cantrip",
    school:      "Evocation",
    ritual:      false,
    castingTime: "Action",
    range:       "60 feet",
    components:  "V, S",
    duration:    "Instantaneous",
    description: "You create an acidic bubble at a point within range, where it explodes in a 5-foot-radius Sphere. Each creature in that Sphere must succeed on a Dexterity saving throw or take 1d6 Acid damage.",
    higherLevels:"The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and  17 (4d6).",
  },

  {  
    name:        "Aid",
    category:    "Spell",
    level:       "2nd-level",
    school:      "Abjuration",
    ritual:      false,
    castingTime: "Action",
    range:       "30 feet",
    components:  "V, S, M (a strip of white cloth)",
    duration:    "8 hours",
    description: "Choose up to three creatures within range. Each target's Hit Point maximum and current Hit Points increase by 5 for the duration.",
    higherLevels:"Each target's Hit Points increase by 5 for each spell slot level above ",
  },

  {  
    name:        "Alarm",
    category:    "Spell",
    level:       "1st-level",
    school:      "Abjuration",
    ritual:      true,
    castingTime: "1 minute",
    range:       "30 feet",
    components:  "V, S, M (a bell and silver wire)",
    duration:    "8 hours",
    description: `<p>You set an alarm against intrusion. Choose a door, a window, or an area within range that is no larger than a 20-foot Cube. Until the spell ends, an alarm alerts you whenever a creature touches or enters the warded area. When you cast the spell, you can designate creatures that won't set off the alarm. You also choose whether the alarm is audible or mental:</p>

    <p><b>Audible Alarm.</b> The alarm produces the sound of a handbell for 10 seconds within 60 feet of the warded area.</p>

    <p><b>Mental Alarm.</b> You are alerted by a mental ping if you are within 1 mile of the warded area. This ping awakens you if you're asleep.</p>`,
    higherLevels:""
  },

  {  
    name:        "Alter Self",
    category:    "Spell",
    level:       "2nd-level",
    school:      "Transmutation",
    ritual:      false,
    castingTime: "Action",
    range:       "Self",
    components:  "V, S",
    duration:    "Concentration, up to 1 hour",
    description: `<p>You alter your physical form. Choose one of the following options. Its effects last for the duration, during which you can take a Magic action to replace the option you chose with a different one.</p>

    <p><b>Aquatic Adaptation.</b> You sprout gills and grow webs between your fingers. You can breathe underwater and gain a Swim Speed equal to your Speed.</p>

    <p><b>Change Appearance.</b> You alter your appearance. You decide what you look like, including your height, weight, facial features, sound of your voice, hair length, coloration, and other distinguishing characteristics. You can make yourself appear as a member of another species, though none of your statistics change. You can't appear as a creature of a different size, and your basic shape stays the same; if you're bipedal, you can't use this spell to become quadrupedal, for instance. For the duration, you can take a Magic action to change your appearance in this way again.</p>

    <p><b>Natural Weapons.</b> You grow claws (Slashing), fangs (Piercing), horns (Piercing), or hooves (Bludgeoning). When you use your Unarmed Strike to deal damage with that new growth, it deals 1d6 damage of the type in parentheses instead of dealing the normal damage for your Unarmed Strike, and you use your spellcasting ability modifier for the attack and damage rolls rather than using Strength.</p>`,
    higherLevels:"",
  },

  {  
    name:        "Animal Friendship",
    category:    "Spell",
    level:       "1st-level",
    school:      "Enchantment",
    ritual:      false,
    castingTime: "Action",
    range:       "3 feet",
    components:  "V, S, M (a morsel of food)",
    duration:    "24 hours",
    description: "Target a Beast that you can see within range. The target must succeed on a Wisdom saving throw or have the Charmed condition for the duration. If you or one of your allies deals damage to the target, the spell ends.",
    higherLevels:"You can target one additional Beast for each spell slot level above 1.",
  },

  {  
    name:        "Animal Messenger",
    category:    "Spell",
    level:       "2nd-level",
    school:      "Enchantment",
    ritual:      true,
    castingTime: "Action",
    range:       "30 feet",
    components:  "V, S, M (a morsel of food)",
    duration:    "24 hours",
    description: `<p>A Tiny Beast of your choice that you can see within range must succeed on a Charisma saving throw, or it attempts to deliver a message for you (if the target's Challenge Rating isn't 0, it automatically succeeds). You specify a location you have visited and a recipient who matches a general description, such as "a person dressed in the uniform of the town guard" or "a red-haired dwarf wearing a pointed hat." You also communicate a message of up to twenty-five words. The Beast travels for the duration toward the specified location, covering about 25 miles per 24 hours or 50 miles if the Beast can fly.</p>

    <p>When the Beast arrives, it delivers your message to the creature that you described, mimicking your communication. If the Beast doesn't reach its destination before the spell ends, the message is lost, and the Beast returns to where you cast the spell.</p>`,

    higherLevels:"The spell's duration increases by 48 hours for each spell slot level above 2.",
  },

  {  
    name:        "Animal Shapes",
    category:    "Spell",
    level:       "8th-level",
    school:      "Transmutation",
    ritual:      false,
    castingTime: "Action",
    range:       "30 feet",
    components:  "V, S",
    duration:    "24 hours",
    description: `<p>Choose any number of willing creatures that you can see within range. Each target shape-shifts into a Large or smaller Beast of your choice that has a Challenge Rating of 4 or lower. You can choose a different form for each target. On later turns, you can take a Magic action to transform the targets again.</p>

    <p>A target's game statistics are replaced by the chosen Beast's statistics, but the target retains its creature type; Hit Points; Hit Point Dice; alignment; ability to communicate; and Intelligence, Wisdom, and Charisma scores. The target's actions are limited by the Beast form's anatomy, and it can't cast spells. The target's equipment melds into the new form, and the target can't use any of that equipment while in that form.</p>

    <p>The target gains a number of Temporary Hit Points equal to the Hit Points of the first form into which it shape-shifts. These Temporary Hit Points vanish if any remain when the spell ends. The transformation lasts for the duration or until the target ends it as a Bonus Action.<p>`,

    higherLevels:"",
  },

  {  
    name:        "Animate Dead",
    category:    "Spell",
    level:       "3rd-level",
    school:      "Necromancy",
    ritual:      false,
    castingTime: "1 minute",
    range:       "10 feet",
    components:  "V, S, M (a drop of blood, a piece of flesh, and a pinch of bone dust)",
    duration:    "Instantaneous",
    description: `<p>Choose a pile of bones or a corpse of a Medium or Small Humanoid within range. The target becomes an Undead creature: a <b>Skeleton</b> if you chose bones or a <b>Zombie</b> if you chose a corpse.</p>

    <p>On each of your turns, you can take a Bonus Action to mentally command any creature you made with this spell if the creature is within 60 feet of you (if you control multiple creatures, you can command any of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move on its next turn, or you can issue a general command, such as to guard a chamber or corridor. If you issue no commands, the creature takes the Dodge action and moves only to avoid harm.</p>

    <p>Once given an order, the creature continues to follow it until its task is complete. The creature is under your control for 24 hours, after which it stops obeying any command you've given it. To maintain control of the creature for another 24 hours, you must cast this spell on the creature again before the current 24-hour period ends. This use of the spell reasserts your control over up to four creatures you have animated with this spell rather than animating a new creature.<p>`,

    higherLevels:"You animate or reassert control over two additional Undead creatures for each spell slot level above 3. Each of the creatures must come from a different corpse or pile of bones.",
  },

  {  
    name:        "Animate Objects",
    category:    "Spell",
    level:       "5th-level",
    school:      "Transmutation",
    ritual:      false,
    castingTime: "Action",
    range:       "120 feet",
    components:  "V, S",
    duration:    "Concentration, up to 1 minute",
    description: `<p>Objects animate at your command. Choose a number of nonmagical objects within range that aren't being worn or carried, aren't fixed to a surface, and aren't Gargantuan. The maximum number of objects is equal to your spellcasting ability modifier; for this number, a Medium or smaller target counts as one object, a Large target counts as two, and a Huge target counts as three.</p>

    <p>Each target animates, sprouts legs, and becomes a Construct that uses the <b>Animated Object</b> stat block; this creature is under your control until the spell ends or until it is reduced to 0 Hit Points. Each creature you make with this spell is an ally to you and your allies. In combat, it shares your Initiative count and takes its turn immediately after yours.</p>

    <p>Until the spell ends, you can take a Bonus Action to mentally command any creature you made with this spell if the creature is within 500 feet of you (if you control multiple creatures, you can command any of them at the same time, issuing the same command to each one). If you issue no commands, the creature takes the Dodge action and moves only to avoid harm. When the creature drops to 0 Hit Points, it reverts to its object form, and any remaining damage carries over to that form.</p>`,
    higherLevels:"The creature's Slam damage increases by 1d4 (Medium or smaller), 1d6 (Large), or 1d12 (Huge) for each spell slot level above 5",
  },

  {  
    name:        "Antilife Shell",
    category:    "Spell",
    level:       "5th-level",
    school:      "Abjuration",
    ritual:      false,
    castingTime: "Action",
    range:       "Self",
    components:  "V, S",
    duration:    "Concentration, up to 1 hour",
    description: `<p>An aura extends from you in a 10-foot Emanation for the duration. The aura prevents creatures other than Constructs and Undead from passing or reaching through it. An affected creature can cast spells or make attacks with Ranged or Reach weapons through the barrier.</p>

    <p>If you move so that an affected creature is forced to pass through the barrier, the spell ends.</p>`,
    higherLevels:"",
  },

  {  
    name:        "Antimagic Field",
    category:    "Spell",
    level:       "8th-level",
    school:      "Abjuration",
    ritual:      false,
    castingTime: "Action",
    range:       "Self",
    components:  "V, S, M (iron filings)",
    duration:    "Concentration, up to 1 hour",
    description: `An aura of antimagic surrounds you in 10-foot Emanation. No one can cast spells, take Magic actions, or create other magical effects inside the aura, and those things can't target or otherwise affect anything inside it. Magical properties of magic items don't work inside the aura or on anything inside it.</p>

    description: `<p>A creature can grapple another creature. Characters typically grapple by using an Unarmed Strike. Many monsters have special attacks that allow them to quickly grapple prey. However a grapple is initiated, it follows these rules. See also "Unarmed Strike" and "Grappled."</p> <p><b>Grappled Condition.</b> Successfully grappling a creature gives it the Grappled condition.</p> <p><b>One Grapple per Hand.</b> A creature must have a hand free to grapple another creature. Some stat blocks and game effects allow a creature to grapple using a tentacle, a maw, or another body part.</p> <p>Whatever part a grappler uses, it can grapple only one creature at a time with that part, and the grappler can't use that part to target another creature unless it ends the grapple.</p> <p><b>Escaping a Grapple.</b> A Grappled creature can use its action to make a Strength (Athletics) or Dexterity (Acrobatics) check against the grapple's escape DC, ending the condition on itself on a success. The condition also ends if the grappler has the Incapacitated condition or if the distance between the Grappled target and the grappler exceeds the grapple's range.</p>`

      keys:      ["name"],
      threshold: 0.35,
    });

    function findSpell(spokenText) {
      const results = fuse.search(spokenText);

      if (results.length > 0) {
        const entry = results[0].item;

       if (entry.category === "Spell") {
         showSpellCard(entry);
      } else if (entry.category === "Rule") {
      showRuleCard(entry);
      } else {
      showEquipmentCard(entry);   // Weapon, Armor, or Tool
      }

    addToLog(entry);
    setStatus("Found: " + entry.name, "found");
  } else {
    const noMatch = document.getElementById("no-match");
    noMatch.textContent = 'No match found for "' + spokenText + '" — try again.';
    noMatch.style.display = "block";
    setStatus("No match found", "error");
  }
}


    // ── 3. VOICE RECOGNITION ──────────────────────────────────
    let recognition = null;

    function initRecognition() {
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        setStatus("Voice not supported — use Chrome or Edge", "error");
        document.getElementById("mic-btn").disabled = true;
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous     = false;
      recognition.lang           = "en-US";
      recognition.interimResults = false;

      recognition.onstart = () => {
        setStatus("Listening...", "listening");
        document.getElementById("mic-btn").classList.add("listening");
      };

      recognition.onresult = (event) => {
        const spoken = event.results[0][0].transcript.toLowerCase();
        findSpell(spoken);
      };

      recognition.onend = () => {
        document.getElementById("mic-btn").classList.remove("listening");
        if (document.getElementById("status").textContent === "Listening...") {
          setStatus("Ready — tap to listen", "");
        }
      };

      recognition.onerror = (e) => {
        document.getElementById("mic-btn").classList.remove("listening");
        setStatus("Mic error: " + e.error, "error");
      };
    }

    function startListening() {
      if (!recognition) initRecognition();
      if (!recognition)  return;
      document.getElementById("no-match").style.display = "none";
      try {
        recognition.start();
      } catch(e) {
        recognition.stop();
        setTimeout(() => recognition.start(), 200);
      }
    }

    function setStatus(text, cls) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.className   = cls || "";
    }


    // ── 4. SPELL CARD FUNCTIONS ───────────────────────────────
    function showSpellCard(spell) {
      document.getElementById("spell-card-name").textContent        = spell.name;
      document.getElementById("spell-card-level").textContent       = spell.level;
      document.getElementById("spell-card-school").textContent      = spell.school;
      document.getElementById("spell-card-time").textContent        = spell.castingTime;
      document.getElementById("spell-card-range").textContent       = spell.range;
      document.getElementById("spell-card-components").textContent  = spell.components;
      document.getElementById("spell-card-duration").textContent    = spell.duration;
      document.getElementById("spell-card-description").innerHTML   = spell.description;

      document.getElementById("spell-card-ritual").style.display =
        spell.ritual ? "inline" : "none";

        const higherSection = document.getElementById("higher-levels-section");
const higherText     = document.getElementById("higher-levels-standalone-text");
if (spell.higherLevels) {
  higherText.textContent = spell.higherLevels;
  higherSection.style.display = "block";
} else {
  higherSection.style.display = "none";
}

      const card = document.getElementById("spell-card");
      card.style.display = "block";
      card.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  
    function showRuleCard(rule) {
  document.getElementById("rule-card-name").textContent       = rule.name;
  document.getElementById("rule-card-description").innerHTML  = rule.description;

  
  const card = document.getElementById("rule-card");
  card.style.display = "block";
  card.scrollIntoView({ behavior: "smooth", block: "start" });
}

function showEquipmentCard(item) {
  document.getElementById("equipment-card-name").textContent       = item.name;
  document.getElementById("equipment-card-type").textContent       = item.category;
  document.getElementById("equipment-card-cost").textContent       = item.cost || "";
  document.getElementById("equipment-card-description").innerHTML   = item.description;

  const statsTable = document.getElementById("equipment-stats-table");
  statsTable.innerHTML = "";

if (item.damage)     statsTable.innerHTML += `<tr><td>Damage:</td><td>&nbsp;${item.damage}</td></tr>`;
if (item.armorClass) statsTable.innerHTML += `<tr><td>Armor Class:</td><td>&nbsp;${item.armorClass}</td></tr>`;
if (item.properties) statsTable.innerHTML += `<tr><td>Properties:</td><td>&nbsp;${item.properties}</td></tr>`;
if (item.weight)     statsTable.innerHTML += `<tr><td>Weight:</td><td>&nbsp;${item.weight}</td></tr>`;

  closeAllCards();
  const card = document.getElementById("equipment-card");
  card.style.display = "block";
  card.scrollIntoView({ behavior: "smooth", block: "start" });
}

function closeAllCards() {
  document.getElementById("spell-card").style.display          = "none";
  document.getElementById("rule-card").style.display           = "none";
  document.getElementById("equipment-card").style.display      = "none";
  document.getElementById("higher-levels-section").style.display = "none";
}


    // ── 5. CAST HISTORY LOG ───────────────────────────────────
    function addToLog(spell) {
      const empty = document.getElementById("empty-log-msg");
      if (empty) empty.remove();

      const now  = new Date();
      const time = now.getHours().toString().padStart(2,"0") + ":" +
                   now.getMinutes().toString().padStart(2,"0");

      const li = document.createElement("li");
      li.innerHTML =
        `<span class="log-level">${spell.level.replace("-level","")}</span>` +
        `<span class="log-name">${spell.name}</span>` +
        `<span class="log-time">${time}</span>`;
      li.addEventListener("click", () => showSpellCard(spell));

      document.getElementById("spell-log-list").prepend(li);
    }

    // Initialize mic on page load
    initRecognition();

  </script>

</body>
</html>
